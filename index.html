<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANGOLA MUSIC AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #050816;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(0, 255, 255, 0.12);
      filter: blur(120px);
      top: -200px;
      left: -200px;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255, 0, 255, 0.12);
      filter: blur(120px);
      bottom: -200px;
      right: -200px;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      padding: 50px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 40px rgba(0,255,255,0.1);
    }

    .logo {
      font-size: 50px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #cfcfcf;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 30px;
    }

    label {
      display: block;
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      height: 140px;
      border-radius: 18px;
      border: none;
      padding: 20px;
      font-size: 16px;
      resize: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
      margin-bottom: 25px;
    }

    textarea::placeholder {
      color: #bbbbbb;
    }

    .generate-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 25px rgba(0,255,255,0.4);
    }

    .generate-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 35px rgba(255,0,255,0.5);
    }

    .loading {
      margin-top: 25px;
      display: none;
      text-align: center;
    }

    .loading p {
      margin-top: 10px;
      color: #d4d4d4;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      margin-top: 15px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      animation: load 4s linear forwards;
    }

    @keyframes load {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }

    .result {
      display: none;
      margin-top: 35px;
      background: rgba(255,255,255,0.04);
      border-radius: 25px;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result h2 {
      margin-bottom: 20px;
      color: #00ffff;
    }

    .lyrics {
      white-space: pre-line;
      line-height: 1.8;
      color: #ededed;
      margin-bottom: 25px;
    }

    .player {
      width: 100%;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 18px;
      text-align: center;
      margin-bottom: 20px;
    }

    .download-btn {
      display: inline-block;
      padding: 14px 25px;
      border-radius: 15px;
      background: linear-gradient(90deg, #00ffff, #ff00ff);
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .footer {
      margin-top: 35px;
      text-align: center;
      color: #aaaaaa;
      font-size: 14px;
    }

    @media(max-width: 768px) {
      .container {
        padding: 30px;
      }

      .logo {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">ANGOLA MUSIC AI</div>

    <div class="subtitle">
      Crie músicas africanas com Inteligência Artificial.
    </div>

    <div class="card">

      <label>Descreva a música que deseja criar:</label>

      <textarea id="prompt" placeholder="Exemplo: Cria Afro Beat romântico em português sobre Luanda..."></textarea>

      <label>Carregue a sua voz para clonagem por IA:</label>

       <input
  type="file"
  id="voiceUpload"
  accept="audio/*"
  style="
    width:100%;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    background:rgba(255,255,255,0.08);
    color:white;
  "
 >
      <button class="generate-btn" onclick="generateMusic()">
        GERAR MÚSICA
      </button>

      <div class="loading" id="loading">
        <p id="loadingText">Iniciando IA...</p>

        <div class="bar">
          <div class="progress"></div>
        </div>
      </div>

      <div class="result" id="result">

        <h2>Música Gerada</h2>

        <div class="lyrics" id="lyrics">
        </div>

        <audio id="audioPlayer" controls style="width:100%; margin-bottom:20px;">
        </audio>

        <a href="#" class="download-btn">
          DOWNLOAD MP3
        </a>

      </div>

    </div>

    <div class="footer">
      © 2026 ANGOLA MUSIC AI — Plataforma Africana de Música com IA
    </div>

  </div>

  <script>

    function generateMusic() {

      const prompt = document.getElementById('prompt').value;
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const lyrics = document.getElementById('lyrics');
      const loadingText = document.getElementById('loadingText');

      if(prompt.trim() === '') {
        alert('Escreva uma descrição da música.');
        return;
      }

      loading.style.display = 'block';
      result.style.display = 'none';

      const messages = [
        'Gerando letra africana...',
        'Criando melodia IA...',
        'Produzindo voz futurista...',
        'Finalizando música...'
      ];

      let index = 0;

      const interval = setInterval(() => {
        if(index < messages.length) {
          loadingText.innerText = messages[index];
          index++;
        }
      }, 1000);

      setTimeout(() => {

        clearInterval(interval);

        loading.style.display = 'none';
        result.style.display = 'block';

        lyrics.innerText = generatedLyrics;
        
        const audioPlayer = document.getElementById('audioPlayer');

const voiceResponse = await fetch(
  'https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL',
  {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'xi-api-key': 'sk_4ee442e0917ecb5979f841ee3afe74b10c4f0eda244c5fa1'
    },
    body: JSON.stringify({
      text: generatedLyrics,
      model_id: 'eleven_multilingual_v2'
    })
  }
);

const audioBlob = await voiceResponse.blob();

const audioUrl = URL.createObjectURL(audioBlob);

audioPlayer.src = audioUrl;

audioPlayer.play();




  </script>

</body>
</html>
