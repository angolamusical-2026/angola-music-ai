<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANGOLA MUSIC AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:25px;
padding:30px;
box-shadow:0 0 30px rgba(0,255,255,0.2);
}

.logo{
font-size:32px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
color:#00ffff;
}

.subtitle{
text-align:center;
margin-bottom:30px;
color:#bbbbbb;
}

.card{
display:flex;
flex-direction:column;
}

label{
margin-bottom:10px;
font-size:18px;
}

textarea{
width:100%;
height:150px;
border:none;
border-radius:18px;
padding:20px;
font-size:16px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
margin-bottom:20px;
resize:none;
}

textarea::placeholder{
color:#bbbbbb;
}

input[type="file"]{
width:100%;
padding:15px;
border-radius:15px;
margin-bottom:20px;
background:rgba(255,255,255,0.08);
color:white;
}

.generate-btn{
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
background:linear-gradient(90deg,#00ffff,#0066ff);
color:white;
cursor:pointer;
transition:0.3s;
}

.generate-btn:hover{
transform:scale(1.03);
}

.loading{
display:none;
margin-top:25px;
text-align:center;
}

.bar{
width:100%;
height:12px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress{
width:0%;
height:100%;
background:#00ffff;
animation:load 3s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

.result{
display:none;
margin-top:30px;
}

.lyrics{
white-space:pre-line;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:18px;
margin-bottom:20px;
line-height:1.7;
}

audio{
width:100%;
margin-bottom:20px;
}

.footer{
margin-top:25px;
text-align:center;
font-size:14px;
color:#999999;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
ANGOLA MUSIC AI
</div>

<div class="subtitle">
Crie músicas africanas com Inteligência Artificial.
</div>

<div class="card">

<label>
Descreva a música:
</label>

<textarea
id="prompt"
placeholder="Exemplo: Cria Afro Beat romântico sobre Luanda..."
></textarea>

<label>
Carregue a sua voz para clonagem IA:
</label>

<input
type="file"
id="voiceUpload"
accept="audio/*"
>

<button
class="generate-btn"
onclick="generateMusic()"
>
GERAR MÚSICA
</button>

<div
class="loading"
id="loading"
>

<p id="loadingText">
Gerando música IA...
</p>

<div class="bar">
<div class="progress"></div>
</div>

</div>

<div
class="result"
id="result"
>

<h2>Música Gerada</h2>

<div
class="lyrics"
id="lyrics"
></div>

<audio
id="audioPlayer"
controls
></audio>

</div>

</div>

<div class="footer">
© 2026 ANGOLA MUSIC AI
</div>

</div>

<script>

async function generateMusic() {

const prompt =
document.getElementById('prompt').value;

const loading =
document.getElementById('loading');

const result =
document.getElementById('result');

const lyrics =
document.getElementById('lyrics');

const audioPlayer =
document.getElementById('audioPlayer');

if(prompt.trim() === ''){

alert('Escreva uma descrição da música.');

return;

}

loading.style.display = 'block';

result.style.display = 'none';

const openaiResponse = await fetch(
'https://api.openai.com/v1/chat/completions',
{
method:'POST',

headers:{
'Content-Type':'application/json',
'Authorization':'Bearer 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'
},

body:JSON.stringify({

model:'gpt-4.1-mini',

messages:[
{
role:'system',
content:'Você é uma IA especialista em criar letras musicais africanas.'
},
{
role:'user',
content:`Cria uma letra musical africana baseada nisso: ${prompt}`
}
]

})

}
);

const openaiData =
await openaiResponse.json();

const generatedLyrics =
openaiData.choices[0].message.content;

setTimeout(async ()=>{

loading.style.display = 'none';

result.style.display = 'block';

lyrics.innerText = generatedLyrics;

try{

const response = await fetch(
'https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL',
{
method:'POST',

headers:{
'Content-Type':'application/json',
'xi-api-key':'COLOCA_AQUI_SUA_CHAVE_ELEVENLABS'
},

body:JSON.stringify({
text:generatedLyrics,
model_id:'eleven_multilingual_v2'
})

}
);

const audioBlob =
await response.blob();

const audioUrl =
URL.createObjectURL(audioBlob);

audioPlayer.src = audioUrl;

audioPlayer.play();

}catch(error){

console.log(error);

alert('Erro ao gerar áudio.');

}

},3000);

}

</script>

</body>
</html>
